apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wg-command-ingress
  namespace: sistema
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: wg-command.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wg-command-service
                port:
                  number: 3000
